<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Devika signature logo</title>
  <desc id="desc">Handwritten signature "Devika" with a small messy heart on a warm cream background.</desc>

  <!-- Background: Warm Alabaster -->
  <rect width="100%" height="100%" fill="#F7F4EF"/>

  <!-- Signature text (uses system/browser fallback cursive fonts) -->
  <!-- Styling uses stroke-only, monoline look to simulate fine-line ink -->
  <g transform="translate(40,40)">
    <text x="0" y="230"
      font-family="'Great Vibes', 'Pacifico', 'Brush Script MT', cursive"
      font-weight="400"
      font-size="200"
      fill="none"
      stroke="#1C1310"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      paint-order="stroke"
      >Devika</text>

    <!-- Small messy hand-drawn heart (vector path) -->
    <!-- The heart sits slightly above and to the right of the signature end -->
    <g transform="translate(700,80) scale(0.9)">
      <path d="M20 30
               C 20 12, 45 8, 55 26
               C 65 8, 90 12, 90 30
               C 90 54, 55 78, 55 78
               C 55 78, 20 54, 20 30 Z"
            fill="none"
            stroke="#1C1310"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"
            />
      <!-- Add a small extra stray stroke to feel hand-drawn/messy -->
      <path d="M62 62 C 68 70, 74 72, 82 70"
            fill="none"
            stroke="#1C1310"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
            opacity="0.95"
            />
    </g>
  </g>

</svg>
